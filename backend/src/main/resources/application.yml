spring:
  application:
    name: mes-dome

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mes_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: Fzy20041126
    hikari:
      pool-name: MesHikariPool
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 5000

  data:
    redis:
      database: 0
      host: localhost
      port: 6379
      timeout: 2000ms
      connect-timeout: 2000ms

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    datatype:
      datetime:
        write-dates-as-timestamps: false

  aop:
    auto: true
    proxy-target-class: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.fzy.mes.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

server:
  port: 8081
  servlet:
    context-path: /
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
  health:
    redis:
      enabled: true

logging:
  level:
    root: INFO
    com.fzy.mes: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    com.baomidou.mybatisplus: DEBUG
    org.redisson: INFO
    org.apache.rocketmq: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/mes-dome.log

mes:
  jwt:
    secret: mes-dome
    access-expire: 900000   # 15分钟
    refresh-expire: 604800000  # 7天


  rocketmq:
    name-server: 127.0.0.1:9876
    producer:
      group: mes-producer-group
      send-message-timeout: 3000
      retry-times-when-send-failed: 2
      max-message-size: 4194304
    consumer:
      group: mes-consumer-group
      consume-thread-min: 5
      consume-thread-max: 20
    topic:
      report-submit: mes_report_submit
      erp-callback: mes_erp_callback
    tag:
      report-submit: submit
      erp-callback: callback

  redis:
    key-prefix: mes
    idempotent:
      erp-order-ttl-days: 7
      report-request-ttl-hours: 24
    lock:
      task-report-ttl-seconds: 30
    cache:
      work-order-stats-ttl-seconds: 60

---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: WARN
    com.fzy.mes: INFO
    com.baomidou.mybatisplus: WARN

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl


