services:
  mysql:
    image: mysql:8.0
    container_name: mes-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Fzy20041126
      MYSQL_DATABASE: mes_db
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mes-mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/sql/mes_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pFzy20041126"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mes-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  mes-mysql-data:
